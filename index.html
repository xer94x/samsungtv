<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samsung TV Plus Player</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');
  :root {
    --bg:#0a0a0f; --surface:#12121a; --card:#1a1a26; --border:#2a2a3a;
    --accent:#1428a0; --accent2:#4a90e2; --text:#e8e8f0; --muted:#55556a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
  header h1{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  #status{margin-left:auto;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
  #status .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .3s}
  #status.ok .dot{background:#44ff88}
  #status.err .dot{background:#ff4444}
  #status.loading .dot{background:var(--accent2);animation:pulse 1s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .top-bar{padding:16px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  #search{flex:1;max-width:400px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
  #search:focus{border-color:var(--accent2)}
  #search::placeholder{color:var(--muted)}
  #refresh-btn{background:rgba(20,40,160,.15);border:1px solid rgba(74,144,226,.4);color:var(--accent2);border-radius:8px;padding:10px 18px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:background .2s}
  #refresh-btn:hover{background:rgba(74,144,226,.22)}
  #refresh-btn:disabled{opacity:.4;cursor:default}
  .cat-filter{display:flex;gap:6px;flex-wrap:wrap;padding:10px 24px;background:var(--surface);border-bottom:1px solid var(--border)}
  .cat-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:5px 12px;font-size:11px;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:'DM Sans',sans-serif}
  .cat-btn:hover,.cat-btn.active{background:rgba(74,144,226,.15);border-color:var(--accent2);color:var(--accent2)}
  #err-banner{display:none;margin:14px 24px 0;background:rgba(255,50,50,.08);border:1px solid rgba(255,50,50,.25);border-radius:8px;padding:12px 18px;font-size:13px;color:#ff8888}
  #err-banner.show{display:block}
  #tip{margin:12px 24px;padding:10px 16px;background:rgba(74,144,226,.07);border:1px solid rgba(74,144,226,.2);border-radius:8px;font-size:12px;color:var(--accent2);display:none}
  #tip.show{display:block}
  .content{padding:24px}
  .category-section{margin-bottom:32px}
  .category-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
  .ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px}
  .ch-card{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;text-decoration:none;color:var(--text);transition:background .15s,border-color .15s,transform .1s;cursor:pointer}
  .ch-card:hover{background:#16163a;border-color:var(--accent2);transform:translateY(-1px)}
  .ch-card:active{transform:translateY(0)}
  .ch-logo{width:36px;height:36px;object-fit:contain;border-radius:6px;background:var(--border);flex-shrink:0}
  .ch-logo-ph{width:36px;height:36px;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent2));flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:11px;color:#fff}
  .ch-num{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--accent2);min-width:26px;text-align:center}
  .ch-info{flex:1;min-width:0}
  .ch-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ch-badge{font-size:9px;padding:2px 5px;border-radius:3px;letter-spacing:1px;flex-shrink:0;background:rgba(74,144,226,.2);color:var(--accent2)}
  .ch-badge.nd{background:var(--border);color:var(--muted)}
  #ch-count{font-size:13px;color:var(--muted)}
  .skeleton{background:linear-gradient(90deg,var(--card) 25%,#1e1e2e 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:10px;height:58px}
  @keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}
</style>

let channelsData = [];
let activeCat = "Tutti";

function setStatus(state, txt) {
  const el = document.getElementById("status");
  el.className = state;
  document.getElementById("status-txt").textContent = txt;
}
function showErr(msg) {
  const b = document.getElementById("err-banner");
  if (msg) { b.textContent = "❌ " + msg; b.classList.add("show"); }
  else b.classList.remove("show");
}

function fetchWithTimeout(url, ms=8000) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, {signal: ctrl.signal}).finally(() => clearTimeout(t));
}

async function loadChannels() {
  document.getElementById("refresh-btn").disabled = true;
  setStatus("loading", "Carico canali...");
  showErr(null);
  document.getElementById("tip").classList.remove("show");

  try {
    // Prova diretto poi proxy
    let data = null;
    try {
      const res = await fetchWithTimeout(DATA_URL, 5000);
      if (res.ok) {
        const buf = await res.arrayBuffer();
        const ds = new DecompressionStream('gzip');
        const writer = ds.writable.getWriter();
        writer.write(new Uint8Array(buf));
        writer.close();
        const reader = ds.readable.getReader();
        const chunks = [];
        while (true) {
          const {done, value} = await reader.read();
          if (done) break;
          chunks.push(value);
        }
        const text = new TextDecoder().decode(
          chunks.reduce((a,b) => { const c=new Uint8Array(a.length+b.length); c.set(a); c.set(b,a.length); return c; }, new Uint8Array(0))
        );
        data = JSON.parse(text);
      }
    } catch(_) {}

    // Se il gz non funziona, prova la versione non compressa via proxy
    if (!data) {
      const plainUrl = "https://i.mjh.nz/SamsungTVPlus/app-it.json";
      data = await Promise.any(
        CORS_PROXIES.map(proxy => proxy(plainUrl)).map(async url => {
          const res = await fetchWithTimeout(url, 10000);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const d = await res.json();
          if (!d) throw new Error("vuoto");
          return d;
        })
      );
    }

    // Parsing dati
    // Struttura .channels.json.gz: { channels: { "IT": { id: { name, slug, logo, ... } } } }
    // Struttura app-it.json: { channels: { id: { name, url, logo } } }
    let rawChannels = {};
    if (data.channels) {
      if (data.channels.it || data.channels.IT) {
        rawChannels = data.channels.it || data.channels.IT;
      } else {
        // Controlla se sono già canali diretti
        const firstVal = Object.values(data.channels)[0];
        if (firstVal && (firstVal.name || firstVal.slug)) {
          rawChannels = data.channels;
        }
      }
    }
    if (Object.keys(rawChannels).length === 0) rawChannels = data;

    channelsData = [];
    for (const [id, ch] of Object.entries(rawChannels)) {
      const name = ch.name || id;
      // jmp2.uk/sam-{slug} è il link che usa matthuisman
      const slug = ch.slug || id;
      const url = ch.url || ch.stream_url || `${JMP2}${slug}`;
      const logo = ch.logo || ch.thumbnail || "";
      // Cerca categoria e numero dalla nostra mappa
      let cat = "🎬 Cinema"; // default
      let num = 200;
      for (const [n, c] of Object.entries(CAT_MAP)) {
        if (name.toLowerCase().includes(n.toLowerCase()) || n.toLowerCase().includes(name.toLowerCase())) {
          cat = c; break;
        }
      }
      for (const [n, nu] of Object.entries(NUM_MAP)) {
        if (name.toLowerCase().includes(n.toLowerCase()) || n.toLowerCase().includes(name.toLowerCase())) {
          num = nu; break;
        }
      }
      channelsData.push({ id, name, url, logo, cat, num, slug });
    }
    channelsData.sort((a,b) => a.num - b.num);

    document.getElementById("ch-count").textContent = `${channelsData.length} canali IT`;
    setStatus("ok", "Canali caricati ✓");
    document.getElementById("tip").classList.add("show");
    renderCatFilter();
    renderChannels();

  } catch(e) {
    setStatus("err", "Errore caricamento");
    showErr("Impossibile caricare i dati dall'API Samsung. Verifica la connessione e riprova. (" + e.message + ")");
    document.getElementById("ch-count").textContent = "— canali";
    document.getElementById("content").innerHTML = "";
  }

  document.getElementById("refresh-btn").disabled = false;
}

function renderCatFilter() {
  const el = document.getElementById("cat-filter");
  el.innerHTML = "";
  const cats = ["Tutti", ...new Set(channelsData.map(c => c.cat))];
  cats.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "cat-btn" + (cat === activeCat ? " active" : "");
    btn.textContent = cat;
    btn.onclick = () => { activeCat = cat; renderCatFilter(); renderChannels(); };
    el.appendChild(btn);
  });
}

function renderChannels() {
  const q = document.getElementById("search").value.toLowerCase();
  const filtered = channelsData.filter(c => {
    const ms = !q || c.name.toLowerCase().includes(q) || String(c.num).includes(q);
    const mc = activeCat === "Tutti" || c.cat === activeCat;
    return ms && mc;
  });

  const groups = {};
  for (const ch of filtered) {
    if (!groups[ch.cat]) groups[ch.cat] = [];
    groups[ch.cat].push(ch);
  }

  const content = document.getElementById("content");
  content.innerHTML = "";

  if (filtered.length === 0) {
    content.innerHTML = '<div style="color:var(--muted);padding:40px;text-align:center">Nessun canale trovato</div>';
    return;
  }

  document.getElementById("ch-count").textContent = `${filtered.length} / ${channelsData.length} canali IT`;

  const catOrder = ["🧒 Kids / Anime","⚽ Sport","🔪 Crime","🍕 Food & Lifestyle","🌿 Natura & Doc","🎬 Cinema","🎵 Musica","📰 News","📺 Serie & Fiction"];
  const sortedCats = [...new Set([...catOrder, ...Object.keys(groups)])].filter(c => groups[c]);

  for (const cat of sortedCats) {
    if (!groups[cat]) continue;
    const sec = document.createElement("div");
    sec.className = "category-section";

    const title = document.createElement("div");
    title.className = "category-title";
    title.textContent = cat;
    sec.appendChild(title);

    const grid = document.createElement("div");
    grid.className = "ch-grid";

    for (const ch of groups[cat]) {
      const a = document.createElement("a");
      a.className = "ch-card";
      a.href = "#";
      const initials = ch.name.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
      const hasUrl = !!ch.url;
      a.innerHTML = `
        ${ch.logo
          ? `<img class="ch-logo" src="${ch.logo}" alt="" onerror="this.outerHTML='<div class=ch-logo-ph>${initials}</div>'">`
          : `<div class="ch-logo-ph">${initials}</div>`}
        <span class="ch-info">
          <span class="ch-num">${ch.num < 200 ? ch.num : '—'}</span>
          <span class="ch-name">${ch.name}</span>
        </span>
        <span class="ch-badge${hasUrl ? '' : ' nd'}">${hasUrl ? 'HLS' : 'N/D'}</span>`;

      a.addEventListener("click", e => {
        e.preventDefault();
        if (ch.url) window.open(ch.url, "_blank", "noopener");
        else alert(`⚠️ Link non disponibile per "${ch.name}". Ricarica per riprovare.`);
      });
      grid.appendChild(a);
    }
    sec.appendChild(grid);
    content.appendChild(sec);
  }
}

// Avvio
loadChannels();
// Rinnovo ogni 30 min
setInterval(loadChannels, 30 * 60 * 1000);
