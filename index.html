<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samsung TV Plus Player</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');
  :root {
    --bg:#0a0a0f; --surface:#12121a; --card:#1a1a26; --border:#2a2a3a;
    --accent:#1428a0; --accent2:#4a90e2; --text:#e8e8f0; --muted:#55556a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
  header h1{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  #status{margin-left:auto;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
  #status .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .3s}
  #status.ok .dot{background:#44ff88}
  #status.err .dot{background:#ff4444}
  #status.loading .dot{background:var(--accent2);animation:pulse 1s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .top-bar{padding:16px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  #search{flex:1;max-width:400px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
  #search:focus{border-color:var(--accent2)}
  #search::placeholder{color:var(--muted)}
  #refresh-btn{background:rgba(20,40,160,.15);border:1px solid rgba(74,144,226,.4);color:var(--accent2);border-radius:8px;padding:10px 18px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:background .2s}
  #refresh-btn:hover{background:rgba(74,144,226,.22)}
  #refresh-btn:disabled{opacity:.4;cursor:default}
  .cat-filter{display:flex;gap:6px;flex-wrap:wrap;padding:10px 24px;background:var(--surface);border-bottom:1px solid var(--border)}
  .cat-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:5px 12px;font-size:11px;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:'DM Sans',sans-serif}
  .cat-btn:hover,.cat-btn.active{background:rgba(74,144,226,.15);border-color:var(--accent2);color:var(--accent2)}
  #err-banner{display:none;margin:14px 24px 0;background:rgba(255,50,50,.08);border:1px solid rgba(255,50,50,.25);border-radius:8px;padding:12px 18px;font-size:13px;color:#ff8888}
  #err-banner.show{display:block}
  #tip{margin:12px 24px;padding:10px 16px;background:rgba(74,144,226,.07);border:1px solid rgba(74,144,226,.2);border-radius:8px;font-size:12px;color:var(--accent2);display:none}
  #tip.show{display:block}
  .content{padding:24px}
  .category-section{margin-bottom:32px}
  .category-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
  .ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
  .ch-card{
    position:relative;
    aspect-ratio:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:10px 8px 26px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    text-decoration:none;
    color:var(--text);
    cursor:pointer;
    transition:background .15s,border-color .15s,transform .1s;
    overflow:hidden;
  }
  .ch-card:hover{background:#16163a;border-color:var(--accent2);transform:translateY(-2px)}
  .ch-card:active{transform:translateY(0)}
  .ch-num{
    position:absolute;
    top:8px;left:10px;
    font-family:'Bebas Neue',sans-serif;
    font-size:12px;
    color:var(--accent2);
    letter-spacing:0.5px;
  }
  .ch-logo{width:88px;height:88px;object-fit:contain;border-radius:6px}
  .ch-logo-ph{
    width:88px;height:88px;border-radius:8px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;
    font-family:'Bebas Neue',sans-serif;font-size:17px;color:#fff;
  }
  .ch-name{
    position:absolute;
    bottom:7px;left:0;right:0;
    text-align:center;
    font-size:11px;
    font-weight:700;
    color:#ffffff;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    padding:0 8px;
  }
  #ch-count{font-size:13px;color:var(--muted)}
  .skeleton{background:linear-gradient(90deg,var(--card) 25%,#1e1e2e 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:12px;aspect-ratio:1;min-height:130px}
  @keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}
</style>
</head>
<body>
<header>
  <h1>SAMSUNG TV PLUS</h1>
  <span id="ch-count">Caricamento...</span>
  <div id="status" class="loading"><div class="dot"></div><span id="status-txt">Carico playlist...</span></div>
</header>
<div class="top-bar">
  <input id="search" type="text" placeholder="🔍  Cerca canale..." oninput="renderChannels()">
  <button id="refresh-btn" onclick="loadChannels()" disabled>🔄 Ricarica</button>
</div>
<div class="cat-filter" id="cat-filter"></div>
<div id="err-banner"></div>
<div id="tip">✅ Playlist caricata — clicca un canale per aprire lo stream</div>
<div class="content" id="content">
  <div class="ch-grid">
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
  </div>
</div>

<script>
const M3U_URL = "https://raw.githubusercontent.com/BuddyChewChew/app-m3u-generator/main/playlists/samsungtvplus_it.m3u";

const CAT_KEYWORDS = {
  "🧒 Kids / Anime": ["inazuma","inuyasha","teen vee","yu-gi-oh","car city","deaplaneta","ducktv","masha","pocoyo","sonic","icarly","super! pop","sponge","supertoon","teletubb","video game"],
  "⚽ Sport": ["dfb","fifa","inter 24","rbn","solocalcio","sportitalia","barça","barca","adventure sport","automoto","golf telev","fishing","motor1","motoretr","move - sport","rally","red bull","salto ostac","supertennis","tennis","boat show","top gear","turbo","poker tour","sport"],
  "🔪 Crime": ["dateline","forensic","giallo","guardia costiera","serie crime","squadra spec","storie crim","true crime","crime time"],
  "🍕 Food & Lifestyle": ["tavola","brindiamo","foodnet","gambero rosso","hell's kitchen","hgtv","per caso","sportoutdoor","viaggi","5-minuti","beauty channel","catfish","class tv moda","dmax","failarmy","fireplace","just for laugh","mudù","nove","people are","real life","real time","pet collective"],
  "🌿 Natura & Doc": ["bbc earth","discovery","guerra mondiale","love the planet","naturetime","waterbear","wedotv","wildearth"],
  "🎬 Cinema": ["action movie","adrenaline","alberto sordi","alta tensione","bizzarro","brividy","cg cine","cg grandi","cine amore","cine paura","cine thriller","cinema italiano","cinemadame","cinemalizia","cinewestern","commedia","dramma","duri a morire","family","fantascienza","film al femm","film asiat","film d'az","film top","immortali","grandi nomi","grjngo","pluto tv film","romance","romantica","smile","supercinema","trailers","velvet","western time"],
  "🎵 Musica": ["70-80","cool summer","deluxe lounge","hip hop","k-pop","kpop","radio italia","rock tv","trace latina","trace urban","vevo"],
  "📰 News": ["3bmeteo","al jazeera","bloomberg","class cnbc","cnbc","cnn","euronews","france 24","giornale radio","sole 24","la 7","nbc news","rai news","sky news","tv5 monde","urania news"],
  "📺 Serie & Fiction": ["anche i ricchi","andromeda","autostop","bbc series","elisa di","h2o","k-drama","martial","mr bean","mutant x","piel salvaje","pluto tv serie","relic hunter","soap latino","soap turco","medico in fam"],
};

function getCategory(name) {
  const n = name.toLowerCase();
  for (const [cat, keywords] of Object.entries(CAT_KEYWORDS)) {
    if (keywords.some(k => n.includes(k))) return cat;
  }
  return "🎬 Cinema";
}

let channelsData = [];
let activeCat = "Tutti";

function setStatus(state, txt) {
  const el = document.getElementById("status");
  el.className = state;
  document.getElementById("status-txt").textContent = txt;
}
function showErr(msg) {
  const b = document.getElementById("err-banner");
  if (msg) { b.textContent = "❌ " + msg; b.classList.add("show"); }
  else b.classList.remove("show");
}

function parseM3U(text) {
  const lines = text.split('\n');
  const channels = [];
  let current = null;
  for (const line of lines) {
    const l = line.trim();
    if (l.startsWith('#EXTINF')) {
      current = {};
      const nameMatch = l.match(/,(.+)$/);
      if (nameMatch) current.name = nameMatch[1].trim();
      const logoMatch = l.match(/tvg-logo="([^"]+)"/);
      if (logoMatch) current.logo = logoMatch[1];
      const numMatch = l.match(/tvg-chno="([^"]+)"/);
      if (numMatch) current.num = parseInt(numMatch[1]) || 9999;
      const groupMatch = l.match(/group-title="([^"]+)"/);
      if (groupMatch) current.group = groupMatch[1];
    } else if (l.startsWith('http') && current) {
      current.url = l;
      current.cat = getCategory(current.name || '');
      channels.push(current);
      current = null;
    }
  }
  return channels;
}

async function loadChannels() {
  document.getElementById("refresh-btn").disabled = true;
  setStatus("loading", "Carico playlist...");
  showErr(null);
  document.getElementById("tip").classList.remove("show");

  try {
    const res = await fetch(M3U_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    channelsData = parseM3U(text);
    channelsData.sort((a, b) => (a.num || 9999) - (b.num || 9999));

    document.getElementById("ch-count").textContent = `${channelsData.length} canali IT`;
    setStatus("ok", "Playlist caricata ✓");
    document.getElementById("tip").classList.add("show");
    renderCatFilter();
    renderChannels();
  } catch(e) {
    setStatus("err", "Errore");
    showErr("Impossibile caricare la playlist: " + e.message);
    document.getElementById("content").innerHTML = "";
  }

  document.getElementById("refresh-btn").disabled = false;
}

function renderCatFilter() {
  const el = document.getElementById("cat-filter");
  el.innerHTML = "";
  const cats = ["Tutti", ...new Set(channelsData.map(c => c.cat))];
  const catOrder = ["Tutti","🧒 Kids / Anime","⚽ Sport","🔪 Crime","🍕 Food & Lifestyle","🌿 Natura & Doc","🎬 Cinema","🎵 Musica","📰 News","📺 Serie & Fiction"];
  const sorted = [...new Set([...catOrder, ...cats])].filter(c => c === "Tutti" || cats.includes(c));
  sorted.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "cat-btn" + (cat === activeCat ? " active" : "");
    btn.textContent = cat;
    btn.onclick = () => { activeCat = cat; renderCatFilter(); renderChannels(); };
    el.appendChild(btn);
  });
}

function renderChannels() {
  const q = document.getElementById("search").value.toLowerCase();
  const filtered = channelsData.filter(c => {
    const ms = !q || (c.name||'').toLowerCase().includes(q) || String(c.num).includes(q);
    const mc = activeCat === "Tutti" || c.cat === activeCat;
    return ms && mc;
  });

  const groups = {};
  for (const ch of filtered) {
    if (!groups[ch.cat]) groups[ch.cat] = [];
    groups[ch.cat].push(ch);
  }

  const content = document.getElementById("content");
  content.innerHTML = "";

  if (filtered.length === 0) {
    content.innerHTML = '<div style="color:var(--muted);padding:40px;text-align:center">Nessun canale trovato</div>';
    return;
  }

  document.getElementById("ch-count").textContent = `${filtered.length} / ${channelsData.length} canali IT`;

  const catOrder = ["🧒 Kids / Anime","⚽ Sport","🔪 Crime","🍕 Food & Lifestyle","🌿 Natura & Doc","🎬 Cinema","🎵 Musica","📰 News","📺 Serie & Fiction"];
  const sortedCats = [...new Set([...catOrder, ...Object.keys(groups)])].filter(c => groups[c]);

  for (const cat of sortedCats) {
    if (!groups[cat]) continue;
    const sec = document.createElement("div");
    sec.className = "category-section";
    const title = document.createElement("div");
    title.className = "category-title";
    title.textContent = cat;
    sec.appendChild(title);
    const grid = document.createElement("div");
    grid.className = "ch-grid";
    for (const ch of groups[cat]) {
      const a = document.createElement("a");
      a.className = "ch-card";
      a.href = "#";
      const initials = (ch.name||'??').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
      const num = ch.num && ch.num < 9000 ? String(ch.num).padStart(3,'0') : '—';
      a.innerHTML = `
        <span class="ch-num">${num}</span>
        ${ch.logo
          ? `<img class="ch-logo" src="${ch.logo}" alt="" onerror="this.outerHTML='<div class=ch-logo-ph>${initials}</div>'">`
          : `<div class="ch-logo-ph">${initials}</div>`}
        <span class="ch-name">${ch.name||''}</span>`;
      a.addEventListener("click", e => {
        e.preventDefault();
        if (ch.url) window.open(ch.url, "_blank", "noopener");
      });
      grid.appendChild(a);
    }
    sec.appendChild(grid);
    content.appendChild(sec);
  }
}

loadChannels();
setInterval(loadChannels, 6 * 60 * 60 * 1000);
</script>
</body>
</html>
