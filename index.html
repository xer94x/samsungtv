<html lang="it">

<meta charset="UTF-8">

<title>Samsung TV Plus Player</title>
<style>

  :root {
    --bg:      #0a0a0f;
    --surface: #12121a;
    --card:    #1a1a26;
    --border:  #2a2a3a;
    --accent:  #1428a0;
    --accent2: #4a90e2;
    --text:    #e8e8f0;
    --muted:   #55556a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  #status {
    margin-left: auto;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #status .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
  }
  #status.ok .dot  { background: #44ff88; }
  #status.err .dot { background: #ff4444; }
  #status.loading .dot {
    background: var(--accent2);
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .top-bar {
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  #search {
    flex: 1;
    max-width: 400px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }
  #search:focus { border-color: var(--accent2); }
  #search::placeholder { color: var(--muted); }

  #refresh-btn {
    background: rgba(20,40,160,.15);
    border: 1px solid rgba(74,144,226,.4);
    color: var(--accent2);
    border-radius: 8px;
    padding: 10px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: background .2s;
  }
  #refresh-btn:hover { background: rgba(74,144,226,.22); }
  #refresh-btn:disabled { opacity: .4; cursor: default; }

  #tip {
    margin: 14px 24px 0;
    padding: 10px 16px;
    background: rgba(74,144,226,.07);
    border: 1px solid rgba(74,144,226,.2);
    border-radius: 8px;
    font-size: 12px;
    color: var(--accent2);
    display: none;
  }
  #tip.show { display: block; }

  #err-banner {
    display: none;
    margin: 14px 24px 0;
    background: rgba(255,50,50,.08);
    border: 1px solid rgba(255,50,50,.25);
    border-radius: 8px;
    padding: 12px 18px;
    font-size: 13px;
    color: #ff8888;
  }
  #err-banner.show { display: block; }

  .content { padding: 24px; }

  .category-section { margin-bottom: 32px; }

  .category-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .ch-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
  }

  .ch-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    text-decoration: none;
    color: var(--text);
    transition: background .15s, border-color .15s, transform .1s;
    cursor: pointer;
  }
  .ch-card:hover {
    background: #16163a;
    border-color: var(--accent2);
    transform: translateY(-1px);
  }
  .ch-card:active { transform: translateY(0); }

  .ch-logo {
    width: 36px;
    height: 36px;
    object-fit: contain;
    border-radius: 6px;
    background: var(--border);
    flex-shrink: 0;
  }
  .ch-logo-placeholder {
    width: 36px;
    height: 36px;
    border-radius: 6px;
    background: var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    color: var(--accent2);
  }

  .ch-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--accent2);
    min-width: 28px;
    text-align: center;
  }
  .ch-info { flex: 1; min-width: 0; }
  .ch-name {
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ch-badge {
    font-size: 9px;
    background: var(--border);
    color: var(--muted);
    padding: 2px 5px;
    border-radius: 3px;
    letter-spacing: 1px;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .skeleton {
    background: linear-gradient(90deg, var(--card) 25%, #1e1e2e 50%, var(--card) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 10px;
    height: 60px;
  }
  @keyframes shimmer { 0%{background-position:200%} 100%{background-position:-200%} }

  #ch-count {
    font-size: 13px;
    color: var(--muted);
  }
</style>
</head>

let channelsData = [];

function fetchWithTimeout(url, ms = 8000) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(timer));
}

function setStatus(state, txt) {
  const el = document.getElementById("status");
  el.className = state;
  document.getElementById("status-txt").textContent = txt;
}

function showErr(msg) {
  const b = document.getElementById("err-banner");
  if (msg) { b.textContent = "⚠️ " + msg; b.classList.add("show"); }
  else { b.classList.remove("show"); }
}

async function fetchSamsungAPI() {
  // Prima tenta diretto
  try {
    const res = await fetchWithTimeout(SAMSUNG_API, 5000);
    if (res.ok) return await res.json();
  } catch(_) {}

  // Poi proxy in parallelo
  return await Promise.any(
    CORS_PROXIES.map(proxy => proxy(SAMSUNG_API)).map(async url => {
      const res = await fetchWithTimeout(url, 10000);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (!data) throw new Error("Dati vuoti");
      return data;
    })
  );
}

async function loadChannels() {
  const btn = document.getElementById("refresh-btn");
  btn.disabled = true;
  setStatus("loading", "Carico canali...");
  showErr(null);

  try {
    const data = await fetchSamsungAPI();
    // L'API restituisce { channels: { id: { name, url, logo, ... } } }
    const raw = data.channels || data;
    channelsData = [];

    // Mappa i canali dell'API con i nostri canali fallback per arricchirli
    const fallbackMap = {};
    FALLBACK_CHANNELS.forEach(c => {
      fallbackMap[c.name.toLowerCase().replace(/[^a-z0-9]/g,'')] = c;
    });

    let num = 1;
    for (const [id, ch] of Object.entries(raw)) {
      const normName = (ch.name || '').toLowerCase().replace(/[^a-z0-9]/g,'');
      const fb = fallbackMap[normName];
      channelsData.push({
        num: fb ? fb.num : num++,
        name: ch.name || id,
        url: ch.url || ch.stream_url || ch.streamUrl || '',
        logo: ch.logo || ch.thumbnail || '',
        cat: fb ? fb.cat : (ch.group || ch.category || 'Vari'),
        id: id
      });
    }

    // Ordina per numero
    channelsData.sort((a,b) => a.num - b.num);

    document.getElementById("ch-count").textContent = `${channelsData.length} canali IT`;
    setStatus("ok", "Canali caricati");
    document.getElementById("tip").classList.add("show");
    renderChannels(document.getElementById("search").value);

  } catch(e) {
    // Fallback: usa lista statica senza URL
    setStatus("err", "API non raggiungibile");
    showErr("Impossibile caricare i link live dall'API Samsung. Mostro la lista canali senza URL diretti. Premi 🔄 Ricarica per riprovare.");
    channelsData = FALLBACK_CHANNELS.map(c => ({ ...c, url: '', logo: '' }));
    document.getElementById("ch-count").textContent = `${channelsData.length} canali IT`;
    renderChannels(document.getElementById("search").value);
  }

  btn.disabled = false;
}

function getCatIcon(cat) {
  const icons = {
    "Kids / Anime": "🧒",
    "Sport": "⚽",
    "Crime": "🔪",
    "Food / Lifestyle": "🍕",
    "Natura / Doc": "🌿",
    "Cinema": "🎬",
    "Musica": "🎵",
    "News": "📰",
    "Serie / Fiction": "📺",
    "Lifestyle": "✨",
    "Vari": "📡",
  };
  return icons[cat] || "📡";
}

function renderChannels(query) {
  const q = (query || "").toLowerCase();
  const filtered = q
    ? channelsData.filter(c => c.name.toLowerCase().includes(q) || String(c.num).includes(q))
    : channelsData;

  const groups = {};
  for (const ch of filtered) {
    if (!groups[ch.cat]) groups[ch.cat] = [];
    groups[ch.cat].push(ch);
  }

  const content = document.getElementById("content");
  content.innerHTML = "";

  if (filtered.length === 0) {
    content.innerHTML = `<div style="color:var(--muted);padding:40px;text-align:center">Nessun canale trovato</div>`;
    return;
  }

  // Ordine categorie
  const catOrder = ["Kids / Anime","Sport","Crime","Food / Lifestyle","Natura / Doc","Cinema","Lifestyle","Musica","News","Serie / Fiction","Vari"];
  const sortedCats = [...new Set([...catOrder, ...Object.keys(groups)])].filter(c => groups[c]);

  for (const cat of sortedCats) {
    if (!groups[cat]) continue;
    const sec = document.createElement("div");
    sec.className = "category-section";

    const title = document.createElement("div");
    title.className = "category-title";
    title.textContent = `${getCatIcon(cat)}  ${cat}`;
    sec.appendChild(title);

    const grid = document.createElement("div");
    grid.className = "ch-grid";

    for (const ch of groups[cat]) {
      const a = document.createElement("a");
      a.className = "ch-card";
      a.href = "#";

      let logoHtml = '';
      if (ch.logo) {
        logoHtml = `<img class="ch-logo" src="${ch.logo}" alt="" onerror="this.style.display='none'">`;
      } else {
        const initials = ch.name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
        logoHtml = `<div class="ch-logo-placeholder">${initials}</div>`;
      }

      a.innerHTML = `
        ${logoHtml}
        <span class="ch-info">
          <span class="ch-num">${ch.num}</span>
          <span class="ch-name">${ch.name}</span>
        </span>
        <span class="ch-badge">${ch.url ? 'HLS' : 'N/D'}</span>`;

      a.addEventListener("click", function(e) {
        e.preventDefault();
        if (ch.url) {
          window.open(ch.url, "_blank", "noopener");
        } else {
          alert(`⚠️ Link non disponibile per "${ch.name}".\nPremi 🔄 Ricarica per tentare di ottenere i link live.`);
        }
      });

      grid.appendChild(a);
    }

    sec.appendChild(grid);
    content.appendChild(sec);
  }
}

// Avvio
loadChannels();

// Rinnovo automatico ogni 30 minuti (i link Samsung scadono)
setInterval(() => {
  loadChannels();
